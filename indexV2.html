<style>
    @font-face {
  font-family: 'pixel';
  src: url('fonts/pixel.otf') format('opentype');
  font-weight: normal;
  font-style: normal;
}
    #rectangle {
    width: 80%;  /* Sets the width of the rectangle */
    height: 15%; /* Sets the height of the rectangle */
    border-radius: 15px;
    background-color: #24201a; /* Sets the background color */
    border: 2px solid black; /* Optional: adds a border */
    position: fixed;     /* Use 'absolute' if it should stay within a specific container */
    top: 0;              /* Aligns it to the very top */
    left: 10%;           /* Moves the left edge to the horizontal center */
  }
</style>
<div id="rectangle">
    <h1 style="font-family: pixel; text-align: left; font-size:90px; position: relative; top: -80px; color: #f77e05 ">MOOGAMES v2</h1>
